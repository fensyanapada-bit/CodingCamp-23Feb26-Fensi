<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER: Total Saldo ===== -->
  <header class="app-header">
    <h1 class="app-title">Expense Budget Visualizer</h1>
    <div class="balance-card">
      <p class="balance-label">Total Pengeluaran</p>
      <p id="total-balance" class="balance-amount">Rp 0</p>
    </div>
  </header>

  <main class="app-main">

    <!-- ===== FORM INPUT TRANSAKSI ===== -->
    <section class="form-section" aria-labelledby="form-heading">
      <h2 id="form-heading" class="section-title">Tambah Transaksi</h2>

      <form id="expense-form" novalidate>

        <div class="form-group">
          <label for="item-name">Nama Item</label>
          <input
            type="text"
            id="item-name"
            name="item-name"
            maxlength="100"
            autocomplete="off"
          >
        </div>

        <div class="form-group">
          <label for="amount">Jumlah (Rp)</label>
          <input
            type="number"
            id="amount"
            name="amount"
            min="1"
            step="any"
          >
        </div>

        <div class="form-group">
          <label for="category">Kategori</label>
          <select id="category" name="category">
            <option value="">-- Pilih Kategori --</option>
            <option value="Makanan">Makanan</option>
            <option value="Transportasi">Transportasi</option>
            <option value="Hiburan">Hiburan</option>
          </select>
        </div>

        <!-- Pesan error validasi -->
        <p id="error-message" class="error-message" role="alert" aria-live="polite" style="display:none;"></p>

        <button type="submit" class="btn-submit">Tambah Transaksi</button>

      </form>
    </section>

    <!-- ===== DAFTAR TRANSAKSI ===== -->
    <section class="list-section" aria-labelledby="list-heading">
      <h2 id="list-heading" class="section-title">Riwayat Transaksi</h2>
      <div
        id="transaction-list"
        class="transaction-list"
        role="list"
        aria-label="Daftar transaksi"
      >
        <!-- Diisi oleh UIRenderer.renderTransactionList() -->
        <p class="empty-placeholder">Belum ada transaksi</p>
      </div>
    </section>

    <!-- ===== PIE CHART DISTRIBUSI KATEGORI ===== -->
    <section class="chart-section" aria-labelledby="chart-heading">
      <h2 id="chart-heading" class="section-title">Distribusi Pengeluaran</h2>
      <div class="chart-container">
        <canvas id="expense-chart" aria-label="Pie chart distribusi pengeluaran per kategori" role="img"></canvas>
        <!-- Placeholder & fallback diinjeksi oleh ChartManager -->
      </div>
    </section>

  </main>

  <!-- Chart.js dari CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Logika aplikasi -->
  <script src="js/app.js"></script>

</body>
</html>
